<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalping Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --neon-green: #10b981;
            --neon-red: #ef4444;
            --neon-yellow: #f59e0b;
            --neon-blue: #3b82f6;
            --neon-purple: #818cf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), #000000);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.3s;
        }

        .tab-btn.active {
            color: var(--neon-blue);
            border-bottom: 2px solid var(--neon-blue);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--neon-green);
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card.green { border-bottom: 3px solid var(--neon-green); }
        .stat-card.yellow { border-bottom: 3px solid var(--neon-yellow); }
        .stat-card.red { border-bottom: 3px solid var(--neon-red); }
        .stat-card.blue { border-bottom: 3px solid var(--neon-blue); }

        .stat-title {
            color: var(--text-dim);
            font-size: 0.825rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
        }

        .dashboard-box {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-short { background: rgba(239, 68, 68, 0.2); color: var(--neon-red); }
        .badge-long { background: rgba(16, 185, 129, 0.2); color: var(--neon-green); }

        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .analysis-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .rec-box {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .section-header {
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--neon-purple);
            border-left: 4px solid var(--neon-purple);
            padding-left: 1rem;
        }

        .backtest-table {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Scalping Terminal V2</h1>
            <div class="live-badge">
                <span class="dot"></span> Monitorización Científica Activa
            </div>
        </header>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('live')">Live Scalps</button>
            <button class="tab-btn" onclick="switchTab('analysis')">Análisis y Reportes (48h)</button>
        </div>

        <!-- TAB: LIVE SCALPS -->
        <div id="tab-live" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card blue">
                    <div class="stat-title">Win Rate</div>
                    <div class="stat-value" id="win-rate">0%</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-title">Full Won (TP2)</div>
                    <div class="stat-value" style="color: var(--neon-green);" id="full-won">0</div>
                </div>
                <div class="stat-card red">
                    <div class="stat-title">Stop Loss</div>
                    <div class="stat-value" style="color: var(--neon-red);" id="lost">0</div>
                </div>
            </div>

            <div class="dashboard-box">
                <table>
                    <thead>
                        <tr>
                            <th>Hora</th>
                            <th>Ticket</th>
                            <th>Tipo</th>
                            <th>Entrada</th>
                            <th>TP1</th>
                            <th>TP2</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="trades-body"></tbody>
                </table>
            </div>
        </div>

        <!-- TAB: ANALYSIS (NEW & IMPROVED) -->
        <div id="tab-analysis" class="tab-content">
            <div class="analysis-grid" id="analysis-content">
                <!-- Llenado por JS -->
            </div>

            <div class="section-header">Resultados Detallados: Simulación del Viernes</div>
            <div class="dashboard-box">
                <table>
                    <thead>
                        <tr>
                            <th>Hora</th>
                            <th>Ticket</th>
                            <th>Tipo</th>
                            <th>Resultado</th>
                            <th>PnL Estimado</th>
                        </tr>
                    </thead>
                    <tbody id="backtest-body">
                        <tr><td colspan="5" style="text-align: center;">Cargando simulación histórica...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            
            if(tab === 'analysis') fetchAnalysis();
        }

        async function fetchDashboard() {
            try {
                const s = await fetch('/api/stats');
                const stats = await s.json();
                document.getElementById('win-rate').innerText = stats.win_rate + '%';
                document.getElementById('full-won').innerText = stats.full_won;
                document.getElementById('lost').innerText = stats.lost;

                const t = await fetch('/api/trades');
                const trades = await t.json();
                const tbody = document.getElementById('trades-body');
                tbody.innerHTML = trades.length ? '' : '<tr><td colspan="7">No hay trades.</td></tr>';
                trades.forEach(tr => {
                    const row = `<tr>
                        <td>${new Date(tr.open_time).toLocaleTimeString()}</td>
                        <td><b>${tr.symbol}</b></td>
                        <td><span class="badge ${tr.type==='SHORT'?'badge-short':'badge-long'}">${tr.type}</span></td>
                        <td>$${tr.entry_price}</td>
                        <td>$${tr.tp1_price}</td>
                        <td>$${tr.tp2_price}</td>
                        <td style="color:${tr.status==='LOST'?'var(--neon-red)':'var(--neon-green)'}">${tr.status}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch(e) {}
        }

        async function fetchAnalysis() {
            const container = document.getElementById('analysis-content');
            const bBody = document.getElementById('backtest-body');
            container.innerHTML = '<p>Ejecutando análisis de Pandas...</p>';
            
            try {
                // 1. Estadísticas Generales
                const r = await fetch('/api/analysis');
                const data = await r.json();
                container.innerHTML = '';
                data.forEach(an => {
                    container.innerHTML += `
                    <div class="analysis-card">
                        <h3>${an.symbol}</h3>
                        <p style="color:var(--text-dim)">Rango 48h: $${an.price_range[0]} - $${an.price_range[1]}</p>
                        <hr style="margin:1rem 0; opacity:0.1">
                        <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem">
                            <span>RSI Promedio</span> <b>${an.rsi_avg}</b>
                        </div>
                        <div style="display:flex; justify-content:space-between">
                            <span>Toques R1/S1</span> <b>${an.r1_touches}/${an.s1_touches}</b>
                        </div>
                        <div class="rec-box">
                            <h4 style="color:var(--neon-purple)">Recomendación V2</h4>
                            <p>SHORT RSI >= ${an.v2_short_rec}</p>
                            <p>LONG RSI <= ${an.v2_long_rec}</p>
                        </div>
                    </div>`;
                });

                // 2. Simulación de Viernes
                const bRes = await fetch('/api/backtest/friday');
                const bData = await bRes.json();
                bBody.innerHTML = '';
                
                let foundAny = false;
                for (let sym in bData) {
                    bData[sym].forEach(trade => {
                        foundAny = true;
                        const pnlColor = trade.res === 'WIN' ? 'var(--neon-green)' : 'var(--neon-red)';
                        bBody.innerHTML += `<tr>
                            <td class="time-dim">${trade.time}</td>
                            <td><b>${sym}</b></td>
                            <td><span class="badge ${trade.type==='SHORT'?'badge-short':'badge-long'}">${trade.type}</span></td>
                            <td style="color:${pnlColor}; font-weight:600">${trade.res === 'WIN' ? '✅ ACIERTO' : '❌ ERROR'}</td>
                            <td style="color:${pnlColor}">$${trade.pnl > 0 ? '+' : ''}${trade.pnl}</td>
                        </tr>`;
                    });
                }
                if (!foundAny) bBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No hubo entradas activadas el viernes con la estrategia actual.</td></tr>';

            } catch(e) { 
                container.innerHTML = '<p>Error al cargar análisis.</p>'; 
                bBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Error al cargar simulación.</td></tr>';
            }
        }

        fetchDashboard();
        setInterval(fetchDashboard, 5000);
    </script>
</body>
</html>
